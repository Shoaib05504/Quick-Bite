name: Security Audit & Secret Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    name: Secret Leak Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false # Fail the workflow if credentials/secrets are detected!

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            admin/package-lock.json

      - name: Audit Backend Dependencies
        run: |
          cd backend
          npm audit --audit-level=critical || echo "⚠️ Critical dependencies found in Backend. Recommend running npm audit fix."

      - name: Audit Frontend Dependencies
        run: |
          cd frontend
          npm audit --audit-level=critical || echo "⚠️ Critical dependencies found in Frontend. Recommend running npm audit fix."

      - name: Audit Admin Dependencies
        run: |
          cd admin
          npm audit --audit-level=critical || echo "⚠️ Critical dependencies found in Admin. Recommend running npm audit fix."
